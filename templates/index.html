<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Stock Market Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.24.2/plotly.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mt-3">Real-time Stock Market Dashboard</h1>
            </div>
        </div>
        
        <div class="row mt-3">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5>Filter Options</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="sectorFilter" class="form-label">Sector</label>
                            <select class="form-select" id="sectorFilter">
                                <option value="all" selected>All Sectors</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="companySearch" class="form-label">Search Company</label>
                            <input type="text" class="form-control" id="companySearch" placeholder="Type to search...">
                        </div>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-header">
                        <h5>Statistics</h5>
                    </div>
                    <div class="card-body">
                        <div id="statsContainer">
                            <p>Total Companies: <span id="totalCompanies">0</span></p>
                            <p>Sectors: <span id="totalSectors">0</span></p>
                            <p>Last Update: <span id="lastUpdate">-</span></p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header">
                        <h5>Company Distribution by Sector</h5>
                    </div>
                    <div class="card-body">
                        <div id="sectorChart" style="height: 300px;"></div>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-header">
                        <h5>Companies Data</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="dataTable">
                                <thead>
                                    <tr>
                                        <th>Company</th>
                                        <th>Sector Code</th>
                                        <th>Last Updated</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <!-- Data will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
